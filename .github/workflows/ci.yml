name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edifis-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edifis
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: edifis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, gd, zip, bcmath, intl
          coverage: none

      # --- Hard gate: every PHP file must at least parse ---
      - name: PHP syntax check
        run: |
          find app database routes config -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # --- Informational (promote to gates once the baseline is clean) ---
      - name: Pint (code style)
        continue-on-error: true
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        continue-on-error: true
        run: vendor/bin/phpstan analyse --no-progress || true

      - name: Pest (tests)
        continue-on-error: true
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: edifis_test
          DB_USERNAME: edifis
          DB_PASSWORD: secret
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: |
          cp .env.example .env
          php artisan key:generate
          vendor/bin/pest

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edifis-mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # --- Hard gate: no errors/warnings (info-level style nits don't block) ---
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
