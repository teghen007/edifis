[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

; Static pool — workers stay alive so OPcache stays warm (no per-request
; recompilation). This is what makes the panel consistently fast.
pm = static
pm.max_children = 8
pm.max_requests = 0

clear_env = no
catch_workers_output = yes
php_admin_value[memory_limit] = 256M
