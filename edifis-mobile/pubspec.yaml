name: edifis
description: EDIFIS — online staff + parent app (cloud-direct, no offline outbox).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.0
  json_annotation: ^4.9.0
  go_router: ^14.0.0
  mobile_scanner: ^5.0.0
  signature: ^5.4.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.0
  intl: ^0.19.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  lucide_icons: ^0.257.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/brand/icon.png"
  adaptive_icon_background: "#0F2350"
  adaptive_icon_foreground: "assets/brand/icon.png"
  min_sdk_android: 21
