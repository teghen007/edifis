# EDIFIS — Prometheus scrape config. Targets are service names on the compose network.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # The EDIFIS app exposes /metrics (Laravel Prometheus exporter — built in Phase 15).
  - job_name: edifis-app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  # PostgreSQL metrics (postgres-exporter — image already present locally).
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis metrics.
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Host/node metrics (CPU, RAM, disk — maps to node-health/UPS monitoring).
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
