# EDIFIS PRODUCTION — Cloud Brain wired to myedifis.com + auto-TLS subdomains.
# Run on a public Linux VPS with ports 80/443 open and DNS pointing to it.
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  app:
    build:
      context: ../../edifis-backend
      dockerfile: Dockerfile
    image: edifis-backend:prod
    environment:
      EDIFIS_MODE: cloud
      DB_HOST: postgres
      REDIS_HOST: redis
    env_file: .env.prod
    # HTTP served by PHP-FPM + Nginx via supervisor (Dockerfile CMD).
    expose: ["8000"]
    volumes:
      - /opt/edifis/secrets/service-account.json:/var/www/storage/app/firebase/service-account.json:ro
      - edifis_storage:/var/www/storage/app/public
      - /opt/edifis/backups:/var/www/storage/app/backups
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: always

  horizon:
    image: edifis-backend:prod
    environment: { EDIFIS_MODE: cloud, DB_HOST: postgres, REDIS_HOST: redis }
    env_file: .env.prod
    command: php artisan horizon
    volumes:
      - /opt/edifis/secrets/service-account.json:/var/www/storage/app/firebase/service-account.json:ro
    depends_on: [app]
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes: ["pgdata:/var/lib/postgresql/data"]
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  # Reverse proxy: terminates TLS for myedifis.com + on-demand TLS for *.myedifis.com.
  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [app]
    restart: always

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  edifis_storage:
